{% extends "base.html" %}
{% block content %}
<div style="max-width:400px; margin:60px auto; background:white; padding:32px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);">
  <h2 style="margin-bottom:24px; text-align:center;">ログイン</h2>
  <form method="POST">
    <label style="display:block; margin-bottom:4px; font-size:14px;">メールアドレス</label>
    <input type="email" name="email" required
      style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; margin-bottom:16px; font-size:14px;" />

    <label style="display:block; margin-bottom:4px; font-size:14px;">パスワード</label>
    <input type="password" name="password" required
      style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; margin-bottom:24px; font-size:14px;" />

    <button type="submit" class="btn btn-primary" style="width:100%;">ログイン</button>
  </form>
  <p style="text-align:center; margin-top:16px; font-size:14px;">
    アカウントをお持ちでない方は <a href="{{ url_for('main.register') }}">新規登録</a>
  </p>
</div>
{% endblock %}
