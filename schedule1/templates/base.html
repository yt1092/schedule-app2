<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スケジュール管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #333; }

    nav {
      background: #2c3e50; color: white; padding: 12px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    nav a { color: white; text-decoration: none; font-size: 14px; margin-left: 16px; }
    nav a:hover { text-decoration: underline; }
    nav .logo { font-size: 18px; font-weight: bold; }

    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }

    .flash { padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
    .flash.success { background: #d4edda; color: #155724; }
    .flash.error   { background: #f8d7da; color: #721c24; }

    /* 優先度カラー */
    .priority-1 { background: #e74c3c; color: white; }
    .priority-2 { background: #e67e22; color: white; }
    .priority-3 { background: #3498db; color: white; }

    button, .btn {
      padding: 8px 16px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block;
    }
    .btn-primary { background: #2c3e50; color: white; }
    .btn-primary:hover { background: #34495e; }
    .btn-danger  { background: #e74c3c; color: white; }
    .btn-danger:hover  { background: #c0392b; }
    .btn-sm { padding: 4px 8px; font-size: 12px; }
  </style>
</head>
<body>
  {% if session.get('user_id') %}
  <nav>
    <span class="logo">📅 スケジュール管理</span>
    <div>
      <span style="font-size:14px;">{{ session.get('email') }}</span>
      <a href="{{ url_for('main.logout') }}">ログアウト</a>
    </div>
  </nav>
  {% endif %}

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
