{% extends "base.html" %}
{% block content %}
<div style="max-width:480px; margin:40px auto; background:white; padding:32px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);">
  <h2 style="margin-bottom:24px;">予定を追加</h2>
  <form method="POST">
    <label style="display:block; margin-bottom:4px; font-size:14px;">タイトル <span style="color:red;">*</span></label>
    <input type="text" name="title" required
      style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; margin-bottom:16px; font-size:14px;" />

    <label style="display:block; margin-bottom:4px; font-size:14px;">メモ（任意）</label>
    <textarea name="description" rows="3"
      style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; margin-bottom:16px; font-size:14px;"></textarea>

    <label style="display:block; margin-bottom:4px; font-size:14px;">優先度</label>
    <select name="priority"
      style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; margin-bottom:16px; font-size:14px;">
      <option value="1">🔴 高</option>
      <option value="2">🟠 中</option>
      <option value="3" selected>🔵 低</option>
    </select>

    <label style="display:block; margin-bottom:4px; font-size:14px;">開始日 <span style="color:red;">*</span></label>
    <input type="date" name="start_date" value="{{ selected_date }}" required
      style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; margin-bottom:16px; font-size:14px;" />

    <label style="display:block; margin-bottom:4px; font-size:14px;">終了日 <span style="color:red;">*</span></label>
    <input type="date" name="deadline" value="{{ selected_date }}" required
      style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; margin-bottom:24px; font-size:14px;" />

    <div style="display:flex; gap:12px;">
      <button type="submit" class="btn btn-primary" style="flex:1;">追加する</button>
      <a href="{{ url_for('main.calendar_view') }}" class="btn" style="flex:1; background:#ddd; text-align:center;">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
